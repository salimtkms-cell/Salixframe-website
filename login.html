<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SL-space</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-wrapper">
        <a href="index.html" class="auth-logo">
            <i class="fa-solid fa-video"></i> SL-space
        </a>
        
        <div class="auth-card fade-up visible">
            <div class="auth-header">
                <h1 id="auth-title">Welcome Back</h1>
                <p id="auth-subtitle">Login to your Customer account</p>
            </div>

            <div class="auth-type-toggle">
                <button id="toggle-customer" class="type-btn active">Customer</button>
                <button id="toggle-editor" class="type-btn">Editor</button>
            </div>

            <form id="auth-form" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary btn-full" id="auth-submit">Log In</button>
            </form>

            <div class="auth-footer">
                <p id="switch-auth-text">Don't have an account? <a href="#" id="auth-mode-toggle">Sign Up</a></p>
            </div>
        </div>

        <a href="index.html" class="btn-back-home">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    </div>

    <script src="auth.js"></script>
</body>
</html>
