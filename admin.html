<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Salixframe</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-container {
            padding: 8rem 5% 4rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .admin-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }
        .user-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .user-table th, .user-table td {
            text-align: left;
            padding: 1.2rem;
            border-bottom: 1px solid var(--border-color);
        }
        .user-table th {
            color: var(--accent-primary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .user-table tr:hover {
            background: rgba(255, 215, 0, 0.02);
        }
        .role-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .role-editor { background: rgba(255, 215, 0, 0.1); color: var(--accent-primary); }
        .role-customer { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-video"></i> Salixframe Admin
        </div>
        <ul class="nav-links">
            <li><a href="index.html">View Site</a></li>
        </ul>
    </nav>

    <main class="admin-container">
        <div class="admin-card fade-up visible">
            <div class="admin-header">
                <h2>Registered Users</h2>
                <button class="btn-secondary" onclick="fetchUsers()"><i class="fa-solid fa-sync"></i> Refresh</button>
            </div>
            
            <table class="user-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Password (Plain)</th>
                        <th>Role</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        async function fetchUsers() {
            try {
                const response = await fetch('/api/admin/users');
                const users = await response.json();
                const list = document.getElementById('user-list');
                list.innerHTML = users.map(user => `
                    <tr>
                        <td><strong>${user.username}</strong></td>
                        <td style="font-family: monospace;">${user.password}</td>
                        <td><span class="role-badge role-${user.type}">${user.type}</span></td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Failed to fetch users:', err);
            }
        }
        document.addEventListener('DOMContentLoaded', fetchUsers);
    </script>
</body>
</html>
