<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | SL-space</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-container {
            padding: 8rem 5% 4rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .admin-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }
        .user-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .user-table th, .user-table td {
            text-align: left;
            padding: 1.2rem;
            border-bottom: 1px solid var(--border-color);
        }
        .user-table th {
            color: var(--accent-primary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .user-table tr:hover {
            background: rgba(255, 215, 0, 0.02);
        }
        .role-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .role-editor { background: rgba(255, 215, 0, 0.1); color: var(--accent-primary); }
        .role-customer { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-video"></i> SL-space Admin
        </div>
        <ul class="nav-links">
            <li><a href="index.html">View Site</a></li>
        </ul>
    </nav>

    <main class="admin-container">
        <div class="admin-card fade-up visible">
            <div class="admin-header">
                <h2>Registered Users</h2>
                <button class="btn-secondary" onclick="fetchUsers()"><i class="fa-solid fa-sync"></i> Refresh</button>
            </div>
            
            <table class="user-table">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Credentials</th>
                        <th>Role & Location</th>
                        <th>Portfolio Summary / Bio</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        async function fetchUsers() {
            try {
                // Fetch both users and editors to link data
                const usersResponse = await fetch('/api/admin/users');
                const editorsResponse = await fetch('/api/editors');
                
                const users = await usersResponse.json();
                const editors = await editorsResponse.json();
                
                const list = document.getElementById('user-list');
                list.innerHTML = users.map(user => {
                    const editorDetails = editors.find(e => e.name === user.username);
                    const location = editorDetails ? editorDetails.locationName : 'Not Set';
                    const bio = editorDetails ? editorDetails.bio : 'N/A';
                    const portfolioCount = editorDetails ? editorDetails.works.length : 0;

                    return `
                        <tr>
                            <td>
                                <div style="display: flex; align-items: center; gap: 0.8rem;">
                                    <div style="width: 35px; height: 35px; border-radius: 50%; background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: var(--accent-primary); border: 1px solid var(--border-color);">
                                        <i class="fa-solid fa-${user.type === 'editor' ? 'clapperboard' : 'user'}"></i>
                                    </div>
                                    <strong>${user.username}</strong>
                                </div>
                            </td>
                            <td>
                                <div style="font-size: 0.85rem; color: var(--text-secondary);">
                                    <i class="fa-solid fa-key" style="font-size: 0.7rem;"></i> ${user.password}
                                </div>
                            </td>
                            <td>
                                <span class="role-badge role-${user.type}">${user.type}</span>
                                <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.3rem;">
                                    <i class="fa-solid fa-location-dot"></i> ${location}
                                </div>
                            </td>
                            <td>
                                <div style="max-width: 300px; font-size: 0.85rem;">
                                    ${user.type === 'editor' ? `
                                        <p style="color: var(--text-primary); margin-bottom: 0.3rem;">${bio.substring(0, 50)}...</p>
                                        <span style="color: var(--accent-primary); font-size: 0.75rem;">
                                            <i class="fa-solid fa-briefcase"></i> ${portfolioCount} Works in Portfolio
                                        </span>
                                    ` : '<span style="color: var(--text-secondary); font-style: italic;">No portfolio for customers</span>'}
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (err) {
                console.error('Failed to fetch users:', err);
            }
        }
        document.addEventListener('DOMContentLoaded', fetchUsers);
    </script>
</body>
</html>
